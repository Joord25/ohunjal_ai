name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create .env.local
        run: |
          echo "NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}" >> .env.local
          echo "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}" >> .env.local
          echo "NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}" >> .env.local
          echo "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}" >> .env.local
          echo "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}" >> .env.local
          echo "NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}" >> .env.local
          echo "NEXT_PUBLIC_PORTONE_STORE_ID=${{ secrets.NEXT_PUBLIC_PORTONE_STORE_ID }}" >> .env.local
          echo "NEXT_PUBLIC_PADDLE_ENV=${{ secrets.NEXT_PUBLIC_PADDLE_ENV }}" >> .env.local
          echo "NEXT_PUBLIC_PADDLE_CLIENT_TOKEN=${{ secrets.NEXT_PUBLIC_PADDLE_CLIENT_TOKEN }}" >> .env.local
          echo "NEXT_PUBLIC_PADDLE_PRICE_MONTHLY=${{ secrets.NEXT_PUBLIC_PADDLE_PRICE_MONTHLY }}" >> .env.local
          echo "NEXT_PUBLIC_PADDLE_ENABLED=${{ secrets.NEXT_PUBLIC_PADDLE_ENABLED }}" >> .env.local
          # 회의 ζ-5-A (2026-04-30): 가격 실험 6개 Paddle Price ID
          echo "NEXT_PUBLIC_PADDLE_PRICE_199=${{ secrets.NEXT_PUBLIC_PADDLE_PRICE_199 }}" >> .env.local
          echo "NEXT_PUBLIC_PADDLE_PRICE_299=${{ secrets.NEXT_PUBLIC_PADDLE_PRICE_299 }}" >> .env.local
          echo "NEXT_PUBLIC_PADDLE_PRICE_399=${{ secrets.NEXT_PUBLIC_PADDLE_PRICE_399 }}" >> .env.local
          echo "NEXT_PUBLIC_PADDLE_PRICE_499=${{ secrets.NEXT_PUBLIC_PADDLE_PRICE_499 }}" >> .env.local
          echo "NEXT_PUBLIC_PADDLE_PRICE_599=${{ secrets.NEXT_PUBLIC_PADDLE_PRICE_599 }}" >> .env.local
          echo "NEXT_PUBLIC_PADDLE_PRICE_699=${{ secrets.NEXT_PUBLIC_PADDLE_PRICE_699 }}" >> .env.local
          echo "NEXT_PUBLIC_PORTONE_CHANNEL_KEY=${{ secrets.NEXT_PUBLIC_PORTONE_CHANNEL_KEY }}" >> .env.local
          echo "NEXT_PUBLIC_GEMINI_API_KEY=${{ secrets.NEXT_PUBLIC_GEMINI_API_KEY }}" >> .env.local
      - run: npm ci && npm run build
      - name: Write service account key
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_OHUNJAL }}' > sa-key.json
      - name: Deploy to Firebase Hosting
        run: npx firebase-tools deploy --only hosting --project ohunjal
        env:
          GOOGLE_APPLICATION_CREDENTIALS: sa-key.json
          FIREBASE_CLI_EXPERIMENTS: webframeworks
